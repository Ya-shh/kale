pipelineInfo:
  name: composable-notebook-workflow
root:
  dag:
    tasks:
      data-prep-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-prep-component
        inputs:
          parameters:
            n_rows:
              componentInputParameter: n_rows
        taskInfo:
          name: data-prep-component
      train-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-component
        dependentTasks:
        - data-prep-component
        inputs:
          artifacts:
            in_dataset:
              taskOutputArtifact:
                outputArtifactKey: out_dataset
                producerTask: data-prep-component
          parameters:
            epochs:
              componentInputParameter: epochs
            learning_rate:
              componentInputParameter: learning_rate
        taskInfo:
          name: train-component
  inputDefinitions:
    parameters:
      epochs:
        defaultValue: 10.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      learning_rate:
        defaultValue: 0.001
        isOptional: true
        parameterType: NUMBER_DOUBLE
      n_rows:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
